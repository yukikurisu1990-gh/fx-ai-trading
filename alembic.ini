# Alembic configuration for fx-ai-trading (Cycle 14 skeleton).
#
# The database URL is read at runtime from the DATABASE_URL environment
# variable by migrations/env.py, keeping secrets out of the repository
# (Phase 6.19 config contract).
#
# At Cycle 14 (M2-1) no revision files exist yet, so DATABASE_URL is not
# strictly required. It becomes mandatory from Cycle 15+ when the first
# migration revision is created and applied.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
version_locations = %(here)s/migrations/versions

# Intentionally blank. migrations/env.py resolves the URL from
# DATABASE_URL at runtime. Do NOT commit real connection strings here.
sqlalchemy.url =


# --- Logging ---

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
