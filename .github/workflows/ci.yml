# GitHub Actions CI for fx-ai-trading.
#
# Runs the same 4-gate quality check as the local pre-commit config
# (.pre-commit-config.yaml): ruff check -> ruff format check -> pytest ->
# custom forbidden-pattern lint. This is the remote half of the two-layer
# quality gate described in docs/development_rules.md 2.

name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest

      - name: Custom lint
        run: python tools/lint/run_custom_checks.py

  contract-tests:
    # Covers Iteration 1 (15 tests) + Iteration 2 (7+ tests, M25 §6.13).
    # Iteration 2 contracts: test_live_confirmation_gate, test_oanda_broker_account_type,
    # test_exit_policy_rules, test_exit_event_fsm, test_email_notifier,
    # test_emergency_flat_two_factor, test_projection_transport, test_iteration2_invariants.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Contract tests
        run: pytest tests/contract/ -v --tb=short

      - name: Verify minimum contract test count
        run: |
          count=$(pytest tests/contract/ --collect-only -q 2>&1 | grep "::test_" | wc -l)
          echo "Contract test count: $count"
          [ "$count" -ge 80 ] || { echo "ERROR: expected >= 80 contract tests, found $count"; exit 1; }
