# GitHub Actions CI for fx-ai-trading.
#
# Runs the same 4-gate quality check as the local pre-commit config
# (.pre-commit-config.yaml): ruff check -> ruff format check -> pytest ->
# custom forbidden-pattern lint. This is the remote half of the two-layer
# quality gate described in docs/development_rules.md 2.

name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        run: pytest

      - name: Custom lint
        run: python tools/lint/run_custom_checks.py

  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Contract tests
        run: pytest tests/contract/ -v --tb=short
